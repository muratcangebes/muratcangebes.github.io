<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solva — Legal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B2540;
    --bg-soft: #0F2C4D;
    --accent: #A0E1E1;
    --text: #E8EEF5;
    --text-muted: #8FA4BD;
    --border: rgba(160, 225, 225, 0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 80px 32px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 56px;
  }
  .logo-wrap img {
    width: 72px;
    height: 72px;
    border-radius: 14px;
  }
  .contact a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 14px;
    transition: color 0.2s;
  }
  .contact a:hover { color: var(--accent); }
  h1 {
    font-family: 'IBM Plex Serif', serif;
    font-size: 44px;
    font-weight: 500;
    line-height: 1.15;
    margin-bottom: 16px;
    letter-spacing: -0.02em;
  }
  .subtitle {
    color: var(--text-muted);
    font-size: 17px;
    line-height: 1.5;
    margin-bottom: 48px;
    max-width: 520px;
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .link-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 28px;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 12px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s;
  }
  .link-card:hover {
    border-color: var(--accent);
    transform: translateX(4px);
  }
  .link-card-title {
    font-family: 'IBM Plex Serif', serif;
    font-size: 19px;
    font-weight: 500;
  }
  .link-card-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .arrow {
    color: var(--accent);
    font-size: 20px;
  }
  footer {
    margin-top: 64px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  footer img {
    width: 32px;
    height: 32px;
    border-radius: 6px;
  }
  footer .ftext {
    font-size: 13px;
    color: var(--text-muted);
  }
  footer a {
    color: var(--text-muted);
    text-decoration: none;
  }
  footer a:hover { color: var(--accent); }
  @media (max-width: 600px) {
    .container { padding: 48px 20px; }
    h1 { font-size: 34px; }
    .logo-wrap { margin-bottom: 40px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo-wrap">
    <img src="logo.svg" alt="Solva">
    <div class="contact">
      <a href="mailto:muratcan.gebes19@gmail.com">[muratcan.gebes19@gmail.com]</a>
    </div>
  </div>

  <h1>Yasal & Legal</h1>
  <p class="subtitle">Solva'nın gizlilik politikası ve kullanım koşulları. / Privacy policy and terms of use for Solva.</p>

  <div class="links">
    <a class="link-card" href="privacy.html">
      <div>
        <div class="link-card-title">Gizlilik Politikası</div>
        <div class="link-card-sub">Privacy Policy</div>
      </div>
      <span class="arrow">→</span>
    </a>
    <a class="link-card" href="terms.html">
      <div>
        <div class="link-card-title">Kullanım Koşulları</div>
        <div class="link-card-sub">Terms of Use</div>
      </div>
      <span class="arrow">→</span>
    </a>
  </div>

  <footer>
    <img src="logo.svg" alt="">
    <div class="ftext">
      © 2026 Solva — <a href="mailto:muratcan.gebes19@gmail.com">[muratcan.gebes19@gmail.com]</a>
    </div>
  </footer>
</div>
</body>
</html>
